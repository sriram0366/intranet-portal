server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Main site
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Health check endpoint used by Kubernetes probes + Nagios
    location /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"UP","service":"intranet-portal"}';
    }

    # nginx stub_status exposed for metrics collection (Graphite/Grafana exporter)
    location /nginx_status {
        stub_status on;
        access_log off;
        allow all;
    }
}
